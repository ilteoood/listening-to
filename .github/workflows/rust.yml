name: Rust Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Run tests
        run: cargo test --verbose

  build:
    if: github.event_name == 'push'
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-musl
          - target: i686-unknown-linux-musl
          - target: x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and test binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: both
          target: ${{ matrix.platform.target }}
          args: "--release"
          strip: true
        env:
          CROSS_CONTAINER_OPTS: "-v /var/run/docker.sock:/var/run/docker.sock"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: listening-to-${{ matrix.platform.target }}
          path: ./target/${{ matrix.platform.target }}/release/listening-to
          retention-days: 1

  docker_image:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Build and publish image
        uses: ilteoood/docker_buildx@master
        with:
          tag: latest
          platform: linux/amd64,linux/arm64,linux/386
          imageName: ilteoood/listening-to
          publish: true
          dockerUser: ilteoood
          dockerPassword: ${{ secrets.DOCKER_HUB_PASSWORD }}
